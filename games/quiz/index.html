<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>答題小遊戲 | 環保小遊戲</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    /* ── 進度條 ── */
    .progress-wrap  { margin-bottom: 1.2rem; text-align: center; }
    .progress-label { font-size: 1.05rem; font-weight: 600; color: var(--text-light); margin-bottom: 0.5rem; }
    .progress-track { background: var(--green-light); border-radius: 999px; height: 16px; overflow: hidden; }
    .progress-fill  { background: linear-gradient(90deg, #fbc02d, #f57f17); height: 100%; border-radius: 999px; transition: width 0.45s ease; }

    /* ── 題目卡片 ── */
    .question-card {
      background: white;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
      border: 3px solid #fff9c4;
      padding: 1.8rem 1.8rem 1.6rem;
      margin-bottom: 1.2rem;
    }
    .question-tag {
      display: inline-block;
      background: #fff9c4;
      color: #f57f17;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0.2rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 0.9rem;
      letter-spacing: 0.05em;
    }
    .question-text {
      font-size: clamp(1.2rem, 3.5vw, 1.55rem);
      font-weight: 700;
      color: var(--text);
      line-height: 1.65;
    }

    /* ── 選項格 ── */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.9rem;
      margin-bottom: 1.1rem;
    }
    .option-btn {
      background: white;
      border: 3px solid #e0e0e0;
      border-radius: var(--radius-lg);
      padding: 1rem 1rem;
      text-align: left;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1),
                  border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .option-btn:hover:not(:disabled) {
      border-color: #fbc02d;
      background: #fffde7;
      transform: translateY(-4px) scale(1.02);
      box-shadow: var(--shadow-sm);
    }
    .option-btn:active:not(:disabled) { transform: scale(0.96); }

    /* 選項字母圓圈 */
    .opt-label {
      min-width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      background: #f5f5f5;
      color: var(--text-light);
      font-weight: 900;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s;
    }
    .opt-text {
      font-size: clamp(0.95rem, 2.5vw, 1.1rem);
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
    }

    /* 答對 */
    .option-btn.correct {
      border-color: #43a047;
      background: #e8f5e9;
      animation: popIn 0.35s ease;
    }
    .option-btn.correct .opt-label { background: #43a047; color: white; }

    /* 答錯 */
    .option-btn.wrong {
      border-color: #e53935;
      background: #ffebee;
      animation: shake 0.45s ease;
    }
    .option-btn.wrong .opt-label { background: #e53935; color: white; }

    /* ── 解析區 ── */
    .explain-box {
      border-radius: var(--radius-md);
      padding: 1rem 1.2rem;
      font-size: 1rem;
      font-weight: 500;
      line-height: 1.7;
      min-height: 3.5rem;
      transition: opacity 0.2s;
    }
    .explain-correct { background: #e8f5e9; color: #1b5e20; border: 2px solid #a5d6a7; animation: popIn 0.35s ease; }
    .explain-wrong   { background: #ffebee; color: #b71c1c; border: 2px solid #ef9a9a; animation: popIn 0.35s ease; }
    .explain-empty   { visibility: hidden; }

    /* ── 開始畫面 ── */
    .start-wrap   { text-align: center; padding: 3rem 1rem; }
    .start-mascot { font-size: 7rem; display: block; animation: mascotBounce 2s ease-in-out infinite; margin-bottom: 1.2rem; }
    .start-title  { font-size: 2.2rem; font-weight: 900; color: var(--green-dark); margin-bottom: 0.8rem; }
    .start-desc   { font-size: 1.1rem; color: var(--text-light); line-height: 1.9; margin-bottom: 1.5rem; }

    /* 分類選擇 */
    .category-btns { display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap; margin-bottom: 2rem; }
    .cat-btn {
      padding: 0.55rem 1.3rem;
      border-radius: 999px;
      border: 2px solid #e0e0e0;
      background: white;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.2s;
    }
    .cat-btn.active, .cat-btn:hover {
      border-color: #fbc02d;
      background: #fff9c4;
      color: #f57f17;
    }

    /* ── 結果畫面 ── */
    .result-stars   { font-size: 2.2rem; letter-spacing: 0.15em; margin: 0.8rem 0; animation: popIn 0.6s ease; }
    .result-actions { display: flex; flex-direction: column; align-items: center; gap: 0.8rem; margin-top: 1.5rem; }

    /* ── 工具 ── */
    .hidden { display: none !important; }

    /* ── 橫式雙欄 ── */
    .quiz-layout { display: flex; flex-direction: column; gap: 1rem; }

    @media (orientation: landscape) {
      .quiz-layout {
        flex-direction: row;
        gap: 2rem;
        align-items: flex-start;
      }
      .quiz-left, .quiz-right { flex: 1; min-width: 0; }
      .question-card { margin-bottom: 0; }
      .start-wrap   { padding: 1.5rem 1rem; }
      .start-mascot { font-size: 4.5rem; margin-bottom: 0.8rem; }
      .start-title  { font-size: 1.8rem; }
      .result-screen { padding: 1.5rem 1rem; }
      .result-emoji  { font-size: 4rem; }
    }

    /* ── RWD ── */
    @media (max-width: 520px) {
      .options-grid { grid-template-columns: 1fr; }
      .question-text { font-size: 1.15rem; }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- 頂部導覽 -->
    <nav class="game-nav">
      <a href="../../index.html" class="btn-back">← 回首頁</a>
      <span class="game-title-bar">💡 答題小遊戲</span>
      <div class="score-board">🏆 <span id="score">0</span> 分</div>
    </nav>

    <!-- ① 開始畫面 -->
    <div id="screen-start" class="screen">
      <div class="start-wrap">
        <span class="start-mascot">💡</span>
        <h2 class="start-title">答題小遊戲</h2>
        <p class="start-desc">
          測試你的環保知識！<br>
          共 <strong>10 題</strong>，每題 <strong>10 分</strong><br>
          選擇題目類別，開始挑戰！
        </p>
        <!-- 分類篩選 -->
        <div class="category-btns">
          <button class="cat-btn active" data-cat="all" onclick="selectCat(this)">全部題目</button>
          <button class="cat-btn" data-cat="recycling" onclick="selectCat(this)">垃圾分類</button>
          <button class="cat-btn" data-cat="cleaning" onclick="selectCat(this)">架房清潔</button>
        </div>
        <button class="btn-restart" onclick="startGame()">開始遊戲！</button>
      </div>
    </div>

    <!-- ② 遊戲畫面 -->
    <div id="screen-game" class="screen hidden">
      <div class="quiz-layout">

        <!-- 左欄：進度 + 題目 -->
        <div class="quiz-left">
          <div class="progress-wrap">
            <div class="progress-label">第 <span id="q-cur">1</span> 題 ／ 共 10 題</div>
            <div class="progress-track">
              <div id="progress-fill" class="progress-fill" style="width:0%"></div>
            </div>
          </div>
          <div id="question-card" class="question-card">
            <span id="question-tag" class="question-tag">垃圾分類</span>
            <p id="question-text" class="question-text">題目顯示在這裡</p>
          </div>
        </div>

        <!-- 右欄：選項 + 解析 -->
        <div class="quiz-right">
          <div class="options-grid" id="options-grid">
            <!-- 由 JS 產生 -->
          </div>
          <div id="explain-box" class="explain-box explain-empty">　</div>
        </div>

      </div>
    </div>

    <!-- ③ 結果畫面 -->
    <div id="screen-result" class="screen hidden">
      <div class="result-screen">
        <span id="result-emoji" class="result-emoji">🏆</span>
        <p id="result-score" class="result-score">100 分</p>
        <div id="result-stars" class="result-stars"></div>
        <p id="result-msg" class="result-message">太厲害了！</p>
        <div class="result-actions">
          <button class="btn-restart" onclick="startGame()">再玩一次 ↺</button>
          <a href="../../index.html" class="btn-back">← 回首頁</a>
        </div>
      </div>
    </div>

  </div>

  <script>
  /* ==========================================
     答題小遊戲邏輯

      cat: 'recycling',
      tag: '垃圾分類',
      q: '以下哪個屬於「金屬」類回收？',

      cat: 'recycling',

      explain: '「消」要用咖啡色布一網打盡所有高接觸面，包含門把、門鎖！大洗還要加擦衛生紙盒、酒精盒、扶把等。',

  /* ── 遊戲狀態 ── */
  const state = {
    questions: [],
    current:   0,
    score:     0,
    total:     10,
    lock:      false,
    category:  'all',
  };

  const LABELS = ['A', 'B', 'C', 'D'];

  /* ── 工具 ── */
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById('screen-' + id).classList.remove('hidden');
  }

  /* ── 選分類 ── */
  function selectCat(btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.category = btn.dataset.cat;
  }

  /* ── 開始遊戲 ── */
  /* ── 從 localStorage 讀後台資料，沒有就用預設題庫 ── */
  function getActiveQuestions() {
    try {
      const raw = localStorage.getItem('ctcm_quiz_custom');
      if (raw) return JSON.parse(raw);
    } catch {}
    return QUESTIONS;
  }

  function startGame() {
    const all  = getActiveQuestions();
    const pool = state.category === 'all'
      ? all
      : all.filter(q => q.cat === state.category);

    // 題庫不足時補全部
    const source = pool.length >= state.total ? pool : all;
    state.questions = shuffle(source).slice(0, state.total);
    state.current   = 0;
    state.score     = 0;
    state.lock      = false;

    updateScore();
    showScreen('game');
    renderQuestion();
  }

  /* ── 渲染題目 ── */
  function renderQuestion() {
    const q = state.questions[state.current];

    document.getElementById('question-tag').textContent  = q.tag;
    document.getElementById('question-text').textContent = q.q;
    document.getElementById('q-cur').textContent         = state.current + 1;
    document.getElementById('progress-fill').style.width =
      ((state.current / state.total) * 100) + '%';

    // 洗牌選項（讓正確答案不固定在同一位置）
    const shuffled = shuffle(q.options);

    // 產生選項按鈕
    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';
    shuffled.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerHTML = `
        <span class="opt-label">${LABELS[i]}</span>
        <span class="opt-text">${opt}</span>
      `;
      btn.onclick = () => selectOption(btn, opt);
      grid.appendChild(btn);
    });

    // 清除解析
    const ex = document.getElementById('explain-box');
    ex.className  = 'explain-box explain-empty';
    ex.textContent = '　';

    // 進場動畫
    const card = document.getElementById('question-card');
    card.classList.remove('anim-pop');
    void card.offsetWidth;
    card.classList.add('anim-pop');
  }

  /* ── 選擇選項 ── */
  function selectOption(clickedBtn, selectedText) {
    if (state.lock) return;
    state.lock = true;

    const q         = state.questions[state.current];
    const isCorrect = selectedText === q.answer;

    // 鎖定所有選項 + 標示正確/錯誤
    document.querySelectorAll('.option-btn').forEach(btn => {
      btn.disabled = true;
      const text = btn.querySelector('.opt-text').textContent;
      if (text === q.answer)                  btn.classList.add('correct');
      if (btn === clickedBtn && !isCorrect)   btn.classList.add('wrong');
    });

    // 加分
    if (isCorrect) {
      state.score += 10;
      updateScore();
    }

    // 顯示解析
    const ex = document.getElementById('explain-box');
    ex.textContent = (isCorrect ? '✓ 答對了！' : '✗ 答錯了！') + '　' + q.explain;
    ex.className   = 'explain-box ' + (isCorrect ? 'explain-correct' : 'explain-wrong');

    // 下一題
    setTimeout(() => {
      state.current++;
      state.lock = false;
      if (state.current >= state.total) {
        showResult();
      } else {
        renderQuestion();
      }
    }, 2000);
  }

  /* ── 更新分數 ── */
  function updateScore() {
    document.getElementById('score').textContent = state.score;
  }

  /* ── 顯示結果 ── */
  function showResult() {
    const pct = state.score / (state.total * 10);
    let emoji, msg, stars;

    if      (pct >= 1.0) { emoji = '🏆'; msg = '滿分達人！環保知識超厲害！';       stars = '⭐⭐⭐⭐⭐'; }
    else if (pct >= 0.8) { emoji = '🌟'; msg = '非常優秀！繼續保持下去！';         stars = '⭐⭐⭐⭐'; }
    else if (pct >= 0.6) { emoji = '👍'; msg = '做得不錯！多練習幾次更厲害！';     stars = '⭐⭐⭐'; }
    else if (pct >= 0.4) { emoji = '💪'; msg = '繼續加油，你可以更好的！';         stars = '⭐⭐'; }
    else                  { emoji = '📚'; msg = '多了解一下，下次一定進步很多！';   stars = '⭐'; }

    document.getElementById('result-emoji').textContent = emoji;
    document.getElementById('result-score').textContent = state.score + ' 分';
    document.getElementById('result-stars').textContent = stars;
    document.getElementById('result-msg').textContent   = msg;

    document.getElementById('progress-fill').style.width = '100%';
    showScreen('result');
  }
  </script>

</body>
</html>
